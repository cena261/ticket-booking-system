spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3316}/${MYSQL_DATABASE:ticket_app}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:ticket}
    password: ${MYSQL_PASSWORD:ticket}
    hikari:
      pool-name: ticket-hikari
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
  flyway:
    locations: classpath:db/migration,classpath:db/seed
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6319}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: ticket-app
      auto-offset-reset: earliest
