spring:
  profiles:
    active: local
  application:
    name: ticket-app
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    listener:
      type: batch
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ticket-order-settlement
      auto-offset-reset: earliest
      max-poll-records: 500
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

jwt:
  secret: ${JWT_SECRET}
  access-ttl: 15m
  refresh-ttl: 7d

order:
  reservation-ttl: 10m
  expiry:
    enabled: true
    poll-interval-ms: 5000
    batch-size: 200
    lock-wait: 0s
    lock-lease: 10s

kafka:
  topic:
    order-place: order-place-topic
    partitions: 3
  producer:
    ack-timeout-seconds: 5

outbox:
  poll-interval-ms: 500
  batch-size: 500
  idempotency-ttl: 24h

server:
  port: ${SERVER_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enable: true
  metrics:
    tags:
      application: ticket-app
      instance: ${INSTANCE_ID:app-1}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        ticket.reserve: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s
        ticket.reserve: 10ms,25ms,50ms,100ms,250ms,500ms
  prometheus:
    metrics:
      export:
        enabled: true
