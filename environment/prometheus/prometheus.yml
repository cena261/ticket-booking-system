global:
  scrape_interval: 5s
  scrape_timeout: 4s
  external_labels:
    monitor: ticket-app

scrape_configs:
  # The Spring Boot app, running on the host during Phase 11 (single instance). Micrometer already
  # tags every series with instance=app-1; Phase 8c adds app-2 here as a second target.
  - job_name: ticket-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: mysql
    static_configs:
      - targets: ["mysqld-exporter:9104"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
