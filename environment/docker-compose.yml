name: ticket-app

services:
  mysql:
    image: mysql:8.4
    container_name: ticket-mysql
    restart: unless-stopped
    command:
      - "--innodb-flush-log-at-trx-commit=${MYSQL_FLUSH_LOG:-1}"
    ports:
      - "${MYSQL_PORT:-3316}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ticket_app}
      MYSQL_USER: ${MYSQL_USER:-ticket}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ticket}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8
    container_name: ticket-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6319}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.3.1
    container_name: ticket-kafka
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:9092,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-ui:
    image: kafbat/kafka-ui:v1.5.0
    container_name: ticket-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"

  app-1:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ticket-app:local
    container_name: ticket-app-1
    restart: unless-stopped
    profiles: [app]
    ports:
      - "${APP_1_PORT:-8091}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local,bench
      SERVER_PORT: 8080
      INSTANCE_ID: app-1
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ticket_app}
      MYSQL_USER: ${MYSQL_USER:-ticket}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ticket}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-32-bytes}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
      SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET:-}
      SEPAY_WEBHOOK_REQUIRE_SIGNATURE: ${SEPAY_WEBHOOK_REQUIRE_SIGNATURE:-true}
      RESERVE_RATELIMIT_LIMITFORPERIOD: ${RESERVE_LIMIT:-20}
      HIKARI_POOL_SIZE: ${HIKARI_POOL_SIZE:-80}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT:-100}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS:-8192}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-200}
      VIRTUAL_THREADS: ${VIRTUAL_THREADS:-true}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
      JDK_JAVA_OPTIONS: ${APP_JAVA_OPTS:--Xmx768m}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  app-2:
    image: ticket-app:local
    container_name: ticket-app-2
    restart: unless-stopped
    profiles: [app]
    ports:
      - "${APP_2_PORT:-8092}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local,bench
      SERVER_PORT: 8080
      INSTANCE_ID: app-2
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ticket_app}
      MYSQL_USER: ${MYSQL_USER:-ticket}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ticket}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-32-bytes}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
      SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET:-}
      SEPAY_WEBHOOK_REQUIRE_SIGNATURE: ${SEPAY_WEBHOOK_REQUIRE_SIGNATURE:-true}
      RESERVE_RATELIMIT_LIMITFORPERIOD: ${RESERVE_LIMIT:-20}
      HIKARI_POOL_SIZE: ${HIKARI_POOL_SIZE:-80}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT:-100}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS:-8192}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-200}
      VIRTUAL_THREADS: ${VIRTUAL_THREADS:-true}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
      JDK_JAVA_OPTIONS: ${APP_JAVA_OPTS:--Xmx768m}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  nginx:
    image: nginx:1.27-alpine
    container_name: ticket-nginx
    restart: unless-stopped
    profiles: [app]
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
    ports:
      - "${APP_GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: ticket-prometheus
    restart: unless-stopped
    profiles: [bench, full]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:13.1.0
    container_name: ticket-grafana
    restart: unless-stopped
    profiles: [bench, full]
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.19.0
    container_name: ticket-mysqld-exporter
    restart: unless-stopped
    profiles: [bench, full]
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=root"
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      mysql:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.86.0
    container_name: ticket-redis-exporter
    restart: unless-stopped
    profiles: [bench, full]
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.3
    container_name: ticket-elasticsearch
    restart: unless-stopped
    profiles: [full]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.3
    container_name: ticket-logstash
    restart: unless-stopped
    profiles: [full]
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "${LOGSTASH_PORT:-5000}:5000"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.3
    container_name: ticket-kibana
    restart: unless-stopped
    profiles: [full]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
